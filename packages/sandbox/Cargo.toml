[package]
name = "guardinstall-sandbox"
version = "0.0.1"
edition = "2021"
autobins = false

[dependencies]
napi = { version = "2.16.0", features = ["napi6"] }
napi-derive = "2.16.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[target.'cfg(any(target_os = "linux", target_os = "macos"))'.dependencies]
libc = "0.2.150"

[target.'cfg(target_os = "linux")'.dependencies]
seccompiler = "0.5.0"
landlock = "0.4.0"
nix = { version = "0.27", features = ["sched"] }

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52.0", features = [
    "Win32_Foundation",
    "Win32_Security",
    "Win32_System_JobObjects",
    "Win32_System_Threading",
    "Win32_System_Memory",
    "Win32_System_IO",
]}

[lib]
name = "guardinstall_sandbox"
crate-type = ["cdylib", "lib"]

[[bin]]
name = "sandboxer"
path = "src/bin/sandboxer.rs"
