name: Build Native Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: libguardinstall_sandbox.so
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: libguardinstall_sandbox.so
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: libguardinstall_sandbox.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: libguardinstall_sandbox.dylib
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: guardinstall_sandbox.dll

    steps:
      - uses: actions/check-out@v4

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cd packages/sandbox && cargo build --release --target ${{ matrix.target }}

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ./packages/sandbox/target/${{ matrix.target }}/release/${{ matrix.binary }}
          tag_name: ${{ github.event.release.tag_name }}

      - name: Upload binaries as artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.target }}-binary
          path: ./packages/sandbox/target/${{ matrix.target }}/release/${{ matrix.binary }}
