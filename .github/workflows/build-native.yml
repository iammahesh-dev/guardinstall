name: Build Native Binaries

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [dev, main]
    paths: ['packages/sandbox/**']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: sandboxer-linux-x64
            build-cmd: |
              cd packages/sandbox && cargo build --release --target x86_64-unknown-linux-gnu --bin sandboxer

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: sandboxer-linux-arm64
            build-cmd: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
              cd packages/sandbox && cargo build --release --target aarch64-unknown-linux-gnu --bin sandboxer

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: sandboxer-macos-x64
            build-cmd: |
              cd packages/sandbox && cargo build --release --target x86_64-apple-darwin --bin sandboxer

          - os: macos-latest
            target: aarch64-apple-darwin
            binary: sandboxer-macos-arm64
            build-cmd: |
              cd packages/sandbox && cargo build --release --target aarch64-apple-darwin --bin sandboxer

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: sandboxer-windows-x64.exe
            build-cmd: |
              cd packages/sandbox && cargo build --release --target x86_64-pc-windows-msvc --bin sandboxer

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build sandboxer binary
        run: ${{ matrix.build-cmd }}

      - name: Upload binaries to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ./packages/sandbox/target/${{ matrix.target }}/release/${{ matrix.binary }}
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries as artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.target }}-sandboxer
          path: ./packages/sandbox/target/${{ matrix.target }}/release/${{ matrix.binary }}
